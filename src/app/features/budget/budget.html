<div class="max-w-2xl mx-auto px-8 pt-12 pb-16">

  <h1 class="text-2xl font-medium text-ink tracking-tight mb-1">Presupuesto mensual</h1>
  <p class="text-sm text-mute mb-8 capitalize">{{ monthName }}</p>

  @if (loading()) {
    <div class="text-center text-mute-soft py-20">Cargando...</div>
  } @else {
    <app-budget-form
      [initialAmount]="budgetAmount()"
      [saving]="saving()"
      [success]="success()"
      [error]="error()"
      (saved)="saveBudget($event)" />

    @if (status()) {
      <app-budget-status [status]="status()!" />
    }
  }

</div>
