<div class="border border-line rounded-2xl p-7 mb-6">
  <h2 class="text-sm font-medium text-ink mb-5">Configurar presupuesto</h2>

  @if (success()) {
    <div class="text-xs text-emerald-600 mb-4">✅ {{ success() }}</div>
  }
  @if (error()) {
    <div class="text-xs text-red-600 mb-4">{{ error() }}</div>
  }

  <app-field label="Monto del presupuesto" class="mb-5 block">
    <input appInput type="number"
           [ngModel]="amount()"
           (ngModelChange)="amount.set($event)"
           name="amount"
           placeholder="0" />
  </app-field>

  <button appBtnPrimary
          (click)="submit()"
          [disabled]="saving()"
          class="disabled:opacity-50 disabled:cursor-not-allowed">
    {{ saving() ? 'Guardando...' : 'Guardar presupuesto' }}
  </button>
</div>
