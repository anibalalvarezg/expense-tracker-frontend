<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">

    <div class="mb-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-brand text-lg">◆</span>
        <span class="font-semibold tracking-tight text-ink">Expense</span>
      </div>
      <h1 class="text-2xl font-medium text-ink">Crear cuenta</h1>
      <p class="text-sm text-mute mt-1">Empieza a controlar tus gastos</p>
    </div>

    @if (error()) {
      <div class="text-xs text-red-600 mb-4">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <app-field label="Nombre" class="mb-4 block">
        <input
          appInput
          type="text"
          [ngModel]="name()"
          (ngModelChange)="name.set($event)"
          name="name"
          placeholder="Tu nombre"
          required />
      </app-field>

      <app-field label="Email" class="mb-4 block">
        <input
          appInput
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="tu@email.com"
          required />
      </app-field>

      <app-field label="Contraseña" class="mb-6 block">
        <input
          appInput
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="Mínimo 6 caracteres"
          required />
        <p class="text-[11px] text-mute-soft mt-1.5">Mínimo 6 caracteres</p>
      </app-field>

      <button
        appBtnPrimary
        type="submit"
        [disabled]="loading()"
        class="w-full justify-center py-2.5 disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading() ? 'Cargando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="text-center text-xs text-mute mt-5">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-brand hover:underline">Inicia sesión</a>
    </p>

  </div>
</div>
