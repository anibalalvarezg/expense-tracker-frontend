<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">

    <div class="mb-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="text-brand text-lg">◆</span>
        <span class="font-semibold tracking-tight text-ink">Expense</span>
      </div>
      <h1 class="text-2xl font-medium text-ink">Crear cuenta</h1>
      <p class="text-sm text-mute mt-1">Empieza a controlar tus gastos</p>
    </div>

    @if (error()) {
      <div class="text-xs text-red-600 mb-4">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-xs font-medium text-mute mb-1.5">Nombre</label>
        <input
          type="text"
          [ngModel]="name()"
          (ngModelChange)="name.set($event)"
          name="name"
          class="w-full bg-white border border-line rounded-lg px-4 py-2.5 text-sm text-ink placeholder:text-mute-soft focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition"
          placeholder="Tu nombre"
          required />
      </div>

      <div class="mb-4">
        <label class="block text-xs font-medium text-mute mb-1.5">Email</label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          class="w-full bg-white border border-line rounded-lg px-4 py-2.5 text-sm text-ink placeholder:text-mute-soft focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition"
          placeholder="tu@email.com"
          required />
      </div>

      <div class="mb-6">
        <label class="block text-xs font-medium text-mute mb-1.5">Contraseña</label>
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          class="w-full bg-white border border-line rounded-lg px-4 py-2.5 text-sm text-ink placeholder:text-mute-soft focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition"
          placeholder="Mínimo 6 caracteres"
          required />
        <p class="text-[11px] text-mute-soft mt-1.5">Mínimo 6 caracteres</p>
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full inline-flex items-center justify-center bg-brand hover:bg-blue-700 text-white text-sm font-medium rounded-full py-2.5 transition-all duration-200 active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading() ? 'Cargando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="text-center text-xs text-mute mt-5">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-brand hover:underline">Inicia sesión</a>
    </p>

  </div>
</div>
