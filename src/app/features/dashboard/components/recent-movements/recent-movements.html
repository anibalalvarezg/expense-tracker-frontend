<app-section label="Últimos movimientos">
  <a action routerLink="/expenses" class="text-xs text-brand hover:underline">Ver todos</a>
  @if (expenses().length === 0) {
    <div class="text-center py-10 border border-dashed border-line rounded-xl">
      <p class="text-2xl mb-2">🧾</p>
      <p class="text-sm text-mute">No hay gastos este mes</p>
    </div>
  } @else {
    <div class="border border-line rounded-xl divide-y divide-line overflow-hidden">
      @for (expense of expenses().slice(0, 5); track expense.id) {
        <div class="flex items-center justify-between px-5 py-3.5 hover:bg-slate-50/60 transition-colors">
          <div class="flex items-center gap-3">
            <span class="w-7 h-7 rounded-full flex items-center justify-center text-xs"
                  [style.background]="expense.categoryColor + '1A'">{{ expense.categoryIcon }}</span>
            <div>
              <p class="text-sm text-ink">{{ expense.description || expense.categoryName }}</p>
              <p class="text-[11px] text-mute-soft mt-0.5">{{ expense.date }}</p>
            </div>
          </div>
          <span class="text-sm text-ink money">$ {{ expense.amount | number:'1.0-0' }}</span>
        </div>
      }
    </div>
  }
</app-section>
