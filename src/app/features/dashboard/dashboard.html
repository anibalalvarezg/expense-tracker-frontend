@if (loading()) {
    <div class="text-center text-mute-soft py-20">Cargando...</div>
  } @else {

    <div class="max-w-6xl mx-auto px-8 pt-16 pb-10">

      <!-- Greeting -->
      <div class="text-center mb-10">
        <h1 class="text-2xl font-medium text-ink tracking-tight">
          Hola, {{ userName() }} <span class="inline-block">👋</span>
        </h1>
        <p class="text-sm text-mute mt-1.5 capitalize">{{ monthLabel() }}</p>
      </div>

      <!-- Tabs + CTAs row -->
      <div class="flex items-end justify-between border-b border-line pb-3 mb-10">
        <div class="flex items-center gap-6">
          <button class="flex items-center gap-1.5 text-sm text-brand font-medium border-b-2 border-brand -mb-[13px] pb-3">
            <span>📊</span> Inicio
          </button>
        </div>
        <div class="flex items-center gap-3">
          <a appBtnGhost routerLink="/expenses">+ Agregar gasto</a>
          <a appBtnPrimary routerLink="/budget">🎯 Presupuesto</a>
        </div>
      </div>

      <!-- Two-column layout -->
      <div class="grid grid-cols-12 gap-10">

        <!-- Left: category breakdown + recents -->
        <div class="col-span-12 lg:col-span-7 flex flex-col gap-8">
          <app-month-expenses [categorySummary]="categorySummary()" [totalMonth]="totalMonth()" />
          <app-recent-movements [expenses]="expenses()" />
        </div>

        <!-- Right: summary + category mini-list -->
        <div class="col-span-12 lg:col-span-5">
          <app-month-summary
            [totalMonth]="totalMonth()"
            [budgetStatus]="budgetStatus()"
            [categorySummary]="categorySummary()" />
        </div>

      </div>
    </div>

  }
