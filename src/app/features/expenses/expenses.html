<div class="max-w-6xl mx-auto px-8 pt-12 pb-16">

  <!-- Page header -->
  <div class="flex items-end justify-between mb-10">
    <div>
      <h1 class="text-2xl font-medium text-ink tracking-tight">Mis gastos</h1>
      <p class="text-sm text-mute mt-1.5">
        {{ filteredExpenses().length }}
        {{ filteredExpenses().length === 1 ? 'registro' : 'registros' }} ·
        <span class="money font-medium text-ink-soft">$ {{ filteredTotal() | number:'1.0-0' }}</span>
      </p>
    </div>
    <div class="flex items-center gap-3">
      <button appBtnGhost
              (click)="exportExcel()"
              [disabled]="exporting()"
              class="disabled:opacity-50 disabled:cursor-not-allowed">
        {{ exporting() ? 'Exportando...' : '⬇ Exportar Excel' }}
      </button>
      <button appBtnPrimary (click)="openForm()">+ Agregar gasto</button>
    </div>
  </div>

  <!-- Inline form -->
  @if (showForm()) {
    <app-expense-form
      [categories]="categories()"
      [editingExpense]="editingExpense()"
      (saved)="saveExpense($event)"
      (cancelled)="closeForm()" />
  }

  <div class="grid grid-cols-12 gap-10">

    <!-- Main list -->
    <div class="col-span-12 lg:col-span-8">

      <!-- Category filter chips -->
      <div class="flex flex-wrap items-center gap-2 mb-6">
        <app-chip [active]="filterCategoryId() === 0" (clicked)="filterCategoryId.set(0)">
          Todas
        </app-chip>
        @for (cat of categories(); track cat.id) {
          <app-chip
            [active]="filterCategoryId() === cat.id"
            [dotColor]="cat.color"
            (clicked)="filterCategoryId.set(filterCategoryId() === cat.id ? 0 : cat.id)">
            {{ cat.icon }} {{ cat.name }}
          </app-chip>
        }
      </div>

      <!-- Date range filter with preset chips -->
      <app-date-range-filter
        [filterFrom]="filterFrom()"
        [filterTo]="filterTo()"
        (filterFromChange)="filterFrom.set($event)"
        (filterToChange)="filterTo.set($event)"
        (cleared)="clearFilters()" />

      <!-- Expense grouped list -->
      <app-expense-list
        [groups]="expenseGroups()"
        [loading]="loading()"
        [hasFilters]="hasFilters()"
        (editClicked)="editExpense($event)"
        (deleteClicked)="deleteExpense($event)" />

    </div>

    <!-- Right: filtered summary -->
    <div class="col-span-12 lg:col-span-4">
      <app-expense-summary
        [count]="filteredExpenses().length"
        [total]="filteredTotal()"
        [average]="filteredAverage()" />
    </div>

  </div>
</div>
